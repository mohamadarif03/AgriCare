<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B6B1D"/>
      <stop offset="100%" style="stop-color:#2E8534"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Leaf/sprout icon -->
  <g transform="translate(32,34)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stem -->
    <path d="M0 16 C0 8, -2 2, 0 -6" stroke="#82DB7E" stroke-width="3.5" fill="none"/>
    <!-- Left leaf -->
    <path d="M0 4 C-8 0, -18 -4, -20 -14 C-10 -12, -4 -6, 0 0" fill="#82DB7E" opacity="0.85"/>
    <!-- Right leaf (main) -->
    <path d="M0 -2 C8 -8, 16 -16, 22 -22 C18 -10, 10 -2, 0 2" fill="#FDC003" opacity="0.9"/>
    <!-- Checkmark -->
    <path d="M-6 -8 L-2 -4 L8 -16" stroke="white" stroke-width="3" fill="none"/>
  </g>
</svg>
